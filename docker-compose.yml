services:
  # ─────────────────────────────────────────────
  # PlanckClaw Agent (one-shot query)
  #   docker compose run --rm planckclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  planckclaw-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planckclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./config/config.json:/home/planckclaw/.planckclaw/config.json:ro
      - planckclaw-workspace:/home/planckclaw/.planckclaw/workspace
    entrypoint: ["planckclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PlanckClaw Gateway (Long-running Bot)
  #   docker compose up planckclaw-gateway
  # ─────────────────────────────────────────────
  planckclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planckclaw-gateway
    restart: unless-stopped
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      # Configuration file
      - ./config/config.json:/home/planckclaw/.planckclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - planckclaw-workspace:/home/planckclaw/.planckclaw/workspace
    command: ["gateway"]

volumes:
  planckclaw-workspace:
